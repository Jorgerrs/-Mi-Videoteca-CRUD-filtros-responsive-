<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Videoteca</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <header class="navbar">
    <div class="navbar__left">
      <span class="logo">🎬</span>
      <h1 class="brand" id="appTitle">Mi Videoteca</h1>
    </div>

    <button class="menu-btn" id="menuBtn" aria-label="Abrir menú">☰</button>

    <nav class="nav" id="nav">
      <button class="nav__link" data-go="home" type="button">Inicio</button>
      <button class="nav__link" data-go="add" type="button">Añadir</button>
      <button class="nav__link" data-go="list" type="button">Mi lista</button>
      <button class="nav__link" data-go="settings" type="button">Ajustes</button>
    </nav>
  </header>

  <main class="container">

    <section class="card view" id="view-home">
      <h2 class="section-title" id="homeTitle">Mi Videoteca</h2>
      <p class="muted" id="homeSubtitle">Elige una opción 👇</p>

      <div class="home-actions">
        <button class="btn home-btn" data-go="add" type="button" id="btnAdd">➕ Añadir</button>
        <button class="btn btn--ghost home-btn" data-go="list" type="button" id="btnList">📚 Mi lista</button>
        <button class="btn btn--ghost home-btn" data-go="settings" type="button" id="btnSettings">⚙️ Ajustes</button>
      </div>
    </section>

  
    <section class="card view hidden" id="view-add">
      <div class="view-head">
        <h2 class="section-title" id="addTitle">Añadir</h2>
        <button class="btn btn--ghost" type="button" data-go="home" id="backFromAdd">⬅ Volver</button>
      </div>

      <form id="addForm" class="form">
        <label>
          <span id="lblTitle">Título</span>
          <input id="titleInput" type="text" placeholder="Ej: The Witcher 3" />
        </label>

        <label>
          <span id="lblType">Tipo</span>
          <select id="typeSelect">
            <option value="Pelicula">Película</option>
            <option value="Serie">Serie</option>
            <option value="Juego">Juego</option>
          </select>
        </label>

        <label>
          <span id="lblStatus">Estado</span>
          <select id="statusSelect">
            <option value="Pendiente">Pendiente</option>
            <option value="Visto">Visto</option>
          </select>
        </label>

        <div id="seenFields" class="seen-fields">
          <label>
            <span id="lblRating">Puntuación (0-10)</span>
            <input id="ratingInput" type="number" min="0" max="10" value="7" />
          </label>

          <label>
            <span id="lblReview">Reseña (opcional)</span>
            <textarea id="reviewInput" rows="3" placeholder="¿Qué te ha parecido?"></textarea>
          </label>
        </div>

        <button class="btn" type="submit" id="btnSubmit">Añadir</button>
      </form>
    </section>

    <section class="card view hidden" id="view-list">
      <div class="view-head">
        <div>
          <h2 class="section-title" id="listTitle">Mi lista</h2>
          <p id="counter" class="counter">Mostrando 0 de 0</p>
        </div>
        <button class="btn btn--ghost" type="button" data-go="home" id="backFromList">⬅ Volver</button>
      </div>

      <section class="card card--inner">
        <h3 class="inner-title" id="filtersTitle">Buscar y filtrar</h3>

        <div class="filters">
          <input id="searchInput" type="text" placeholder="Buscar por título..." />

          <select id="filterType">
            <option value="ALL">Todos los tipos</option>
            <option value="Pelicula">Película</option>
            <option value="Serie">Serie</option>
            <option value="Juego">Juego</option>
          </select>

          <select id="filterStatus">
            <option value="ALL">Todos los estados</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Visto">Visto</option>
          </select>

          <button class="btn btn--ghost" id="clearFilters" type="button">Limpiar filtros</button>
        </div>
      </section>

      <div id="cards" class="grid"></div>
    </section>

  
    <section class="card view hidden" id="view-settings">
      <div class="view-head">
        <h2 class="section-title" id="settingsTitle">Ajustes</h2>
        <button class="btn btn--ghost" type="button" data-go="home" id="backFromSettings">⬅ Volver</button>
      </div>

      <div class="settings">
        <div class="setting-row">
          <label for="themeSelect" id="lblTheme">Tema</label>
          <select id="themeSelect">
            <option value="blue">Azul</option>
            <option value="purple">Morado</option>
            <option value="green">Verde</option>
            <option value="red">Rojo</option>
          </select>
        </div>

        <div class="setting-row">
          <label for="langSelect" id="lblLang">Idioma</label>
          <select id="langSelect">
            <option value="es">Español</option>
            <option value="en">English</option>
          </select>
        </div>

        <p class="muted" id="settingsHint">Los cambios se guardan automáticamente.</p>
      </div>
    </section>

  </main>

  <div class="modal hidden" id="modal">
    <div class="modal__overlay" id="modalOverlay"></div>
    <div class="modal__box">
      <h3 id="modalTitle">Confirmar</h3>
      <p id="modalText">¿Seguro?</p>
      <div class="modal__actions">
        <button class="btn btn--ghost" id="cancelDelete" type="button">Cancelar</button>
        <button class="btn btn--danger" id="confirmDelete" type="button">Eliminar</button>
      </div>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
